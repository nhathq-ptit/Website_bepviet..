<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bếp Việt Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

    <main class="login-box">
        <h2>BếpViệt.</h2>
        <p>Đăng nhập trang quản trị</p>

        <form id="loginForm">
            <div class="form-group-login">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" class="form-control-login" required placeholder="Nhập tên đăng nhập...">
            </div>
            <div class="form-group-login">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control-login" required placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit" class="btn-login" id="submitBtn">Đăng Nhập Ngay</button>
            <div id="errorMsg" class="error-msg">Sai tài khoản hoặc mật khẩu!</div>
        </form>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
